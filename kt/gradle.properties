org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
kotlin.code.style=official

# We define the source set hierarchy explicitly (jvmAndAndroidMain) so the
# default template would warn about overlap.
kotlin.mpp.applyDefaultHierarchyTemplate=false

# Default version when not provided via -Pwebtransportffi.version.
# CI overrides this from the web-transport-ffi-v* tag.
webtransportffi.version=0.0.0-dev

# Publishing is disabled by default. CI flips this when MAVEN_CENTRAL_USERNAME
# and SIGNING_KEY secrets are configured. See README.md for setup details.
publishing.enabled=false

# Android target is opt-in: CI sets -Pandroid.enabled=true. Local dev
# without Google maven access (or without the Android SDK installed)
# still builds the JVM variant.
android.useAndroidX=true
android.nonTransitiveRClass=true
