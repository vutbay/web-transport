name: release-js

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - "js/**"
      - "rs/web-transport-node/**"

concurrency:
  group: release-js
  cancel-in-progress: false

jobs:
  build-native:
    if: github.repository_owner == 'moq-dev'
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: js/web-transport

      - name: Build native module
        working-directory: js/web-transport
        run: |
          bunx napi build --platform --release --target ${{ matrix.target }} --manifest-path ../../rs/web-transport-node/Cargo.toml --output-dir .

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: js/web-transport/*.node
          if-no-files-found: error

  release-pure-ts:
    if: github.repository_owner == 'moq-dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix develop --command bun install

      - name: Release @moq/qmux
        working-directory: js/qmux
        run: nix develop --command bun run release

  release-native:
    if: github.repository_owner == 'moq-dev'
    runs-on: ubuntu-latest
    needs: [build-native, release-pure-ts]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix develop --command bun install
        working-directory: js/web-transport

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: js/web-transport/artifacts

      - name: Release
        working-directory: js/web-transport
        run: nix develop --command bun run release
